<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You're In! — Puzzles Game Show</title>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Work+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  body{
    margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:#1B1B3A; color:#FAF9F6; font-family:'Work Sans', sans-serif; text-align:center; padding:24px;
  }
  h1{ font-family:'Bungee', system-ui, sans-serif; font-weight:400; font-size:clamp(28px,5vw,44px); color:#F4B942; margin:0 0 16px; }
  p{ font-size:16px; color:rgba(250,249,246,0.82); max-width:480px; margin:0 auto 8px; line-height:1.6; }
  a{ color:#2EC4B6; }
  #status{ margin-top:28px; font-weight:600; }
</style>
</head>
<body>
  <div>
    <h1>You're In! 🎉</h1>
    <p>Thanks for being part of the Puzzles Game Show. A confirmation email will be sent closer to the day of the event. Please feel free to reach out to info@puzzlesmarathon.com for any immediate questions.</p>
    <p id="status">Finalizing your registration…</p>
  </div>

<script>
  const BACKEND = "https://puzzles-marathon-backend.onrender.com";

  (async function finalize(){
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get("session_id");
    const statusEl = document.getElementById("status");

    if(!sessionId){
      statusEl.textContent = "No session found — if you completed payment, check your email for confirmation.";
      return;
    }

    try{
      const res = await fetch(`${BACKEND}/finalize-registration`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ sessionId }),
      });
      const data = await res.json();
      if(!res.ok) throw new Error(data.error || "finalize-failed");

      statusEl.textContent = "You're all set — see you at the show!";
    }catch(err){
      console.error("Finalize failed", err);
      statusEl.textContent = "Payment went through, but we hit a snag saving your details — email hello@puzzlescommunity.com and we'll sort it out.";
    }
  })();
</script>
</body>
</html>
