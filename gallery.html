<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Puzzles Marathon Gallery</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="icon" href="assets/img/logo-heart.jpg" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 text-slate-900">

<!-- HEADER -->
<header class="bg-white border-b border-slate-200">
  <div class="max-w-7xl mx-auto px-4 py-5 flex items-center justify-between">
    <a href="index.html" class="flex items-center gap-3 font-semibold text-xl">
      <img src="assets/img/logo-heart.jpg" class="w-9 h-9 rounded-full" />
      Puzzles Marathon
    </a>

    <a href="index.html"
       class="text-blue-600 font-medium hover:underline">
      ← Back to Home
    </a>
  </div>
</header>

<!-- HERO -->
<section class="max-w-7xl mx-auto px-4 py-16 text-center">
  <h1 class="text-5xl font-bold mb-4">
    Event Gallery 📸
  </h1>

  <p class="text-slate-600 text-lg max-w-2xl mx-auto">
    Thank you for being part of our first-ever Puzzles Marathon event.
    Download and share your favorite memories from the day.
  </p>
</section>

<!-- GALLERY -->
<section class="max-w-7xl mx-auto px-4 pb-20">

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">

    <!-- IMAGE CARD -->
    <div class="bg-white rounded-2xl shadow overflow-hidden">
      <img src="assets/img/gallery/photo1.jpg"
           class="w-full h-72 object-cover" />

      <div class="p-5">
        <h3 class="font-semibold text-lg mb-3">
          Opening Ceremony
        </h3>

        <a href="assets/img/gallery/photo1.jpg"
           download
           class="inline-block bg-blue-600 text-white px-5 py-2 rounded-xl hover:bg-blue-700 transition">
          Download
        </a>
      </div>
    </div>

    <!-- IMAGE CARD -->
    <div class="bg-white rounded-2xl shadow overflow-hidden">
      <img src="assets/img/gallery/photo2.jpg"
           class="w-full h-72 object-cover" />

      <div class="p-5">
        <h3 class="font-semibold text-lg mb-3">
          Kids Zone
        </h3>

        <a href="assets/img/gallery/photo2.jpg"
           download
           class="inline-block bg-blue-600 text-white px-5 py-2 rounded-xl hover:bg-blue-700 transition">
          Download
        </a>
      </div>
    </div>

    <!-- IMAGE CARD -->
    <div class="bg-white rounded-2xl shadow overflow-hidden">
      <img src="assets/img/gallery/photo3.jpg"
           class="w-full h-72 object-cover" />

      <div class="p-5">
        <h3 class="font-semibold text-lg mb-3">
          Community Run
        </h3>

        <a href="assets/img/gallery/photo3.jpg"
           download
           class="inline-block bg-blue-600 text-white px-5 py-2 rounded-xl hover:bg-blue-700 transition">
          Download
        </a>
      </div>
    </div>

  </div>

</section>

</body>
</html>
